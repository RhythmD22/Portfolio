<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Home - Rhythm Desai</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Prevent horizontal overflow */
    html, body {
      max-width: 100%;
      overflow-x: hidden;
    }

    .profile-image {
      display: block;
      max-width: 260px;
      width: 100%;
      height: auto;
      margin-right: auto;
      margin-left: 7rem;
      border-radius: 50%;
      box-shadow: 0 4px 24px 0 rgba(0,0,0,0.06);
      background: #faefd8;
    }
    @media (max-width: 900px) {
      .intro {
        flex-direction: column;
        align-items: flex-start;
        gap: 2rem;
        width: 100%;
      }
      .intro-text {
        max-width: 100%;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .profile-image {
        margin: 0 auto;
        max-width: 180px;
      }
    }

    /* Portrait-specific centering for mobile */
    @media (max-width: 900px) and (orientation: portrait) {
      .intro {
        align-items: center;
        text-align: center;
        width: 100%;
      }
      .intro-text {
        text-align: center;
        margin: 0 auto;
        width: 100%;
        max-width: min(28rem, 100vw); /* never exceed viewport width */
        padding-left: max(16px, env(safe-area-inset-left));   /* account for notches/safe areas */
        padding-right: max(16px, env(safe-area-inset-right));
        overflow-wrap: anywhere;  /* better at breaking long tokens */
        word-break: break-word;
        white-space: normal;
      }
      /* ensure headings and paragraphs wrap safely */
      .intro-text h2,
      .intro-text p {
        max-width: 100%;
        overflow-wrap: anywhere;
        word-break: break-word;
        margin-left: auto;
        margin-right: auto;
      }
    }
    /* Tighten footer link spacing */
    .site-footer nav a,
    .site-footer nav .link-text {
      margin-right: 0;
      padding-right: 0;
    }
  </style>
</head>
<body>
  <div class="container">
        <div id="header-placeholder"></div>
    <div class="description-container">
      <section class="intro">
        <div class="intro-text">
            <h2 style="font-size: 2rem; margin: 0 0 1rem; font-weight: 600;">Hey, I'm Rhythm!</h2>
          <p style="line-height: 1.5;">I'm a recent University of Pittsburgh graduate and an aspiring UI/UX Designer. I design clean interfaces and immersive experiences that bring together form and function.</p>
          <p style="line-height: 1.5;">I combine design tools and frontend development to craft meaningful, intuitive digital products.</p>
        </div>
        <img src="Images/Profile.png" alt="Profile image" class="profile-image">
      </section>
    </div>
        <div id="footer-placeholder"></div>
  </div>
  <script src="templates.js"></script>
</body>
</html>
